<!DOCTYPE html> 
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Node.js Server Demo</title>
  <!-- Фавиконка: -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <!-- LOADER -->
  <div id="loader">
    <div class="spinner"></div>
    <div>Загрузка...</div>
  </div>

  <script>

    const loader = document.getElementById('loader');

    // ===== UTILS =====

    const fetchWithTimeout = (url, options, timeout = 10000) => {
      return Promise.race([
        fetch(url, options),
        new Promise((_, reject) =>
          setTimeout(() => reject(new Error('Timeout')), timeout)
        )
      ]);
    };

    const fetchWithRetry = async (url, options, retries = 2) => {
      try {
        return await fetchWithTimeout(url, options);
      } catch (err) {
        if (retries <= 0) throw err;
        return fetchWithRetry(url, options, retries - 1);
      }
    };

    // ===== RENDER =====

    const handleUpdateRender = async () => {
      loader.style.display = 'flex';
      try {
        const response = await fetch('https://testserverrender.onrender.com/bd', { method: 'POST' });

        if (!response.ok) {
          const errText = await response.text();
          alert('Ошибка при запросе к серверу: ' + errText);
           loader.style.display = 'none';
          return;
        }

        const data = await response.json();
        localStorage.setItem('personData', JSON.stringify(data.result));
        window.location.href = 'https://testserverrender.onrender.com/front/viewData.html';

      } catch (error) {
        console.error('Ошибка:', error);
         loader.style.display = 'none';
        alert('Ошибка: ' + error.message);
      }
    };
    handleUpdateRender()
  </script>
</body>
</html>
